# Render 部署配置文件
# 文档: https://render.com/docs/yaml-spec
services:
  # 女神节祝福卡片应用
  - type: web
    name: greeting-card-app
    env: node
    # 构建配置 - 修复依赖安装问题
    buildCommand: |
      echo "开始构建女神节祝福卡片应用..."
      cd backend
      echo "当前目录: $(pwd)"
      echo "Node版本: $(node --version)"
      echo "NPM版本: $(npm --version)"
      echo "正在清理缓存..."
      npm cache clean --force || true
      echo "正在安装生产依赖..."
      npm ci --only=production --silent
      echo "依赖安装完成，检查express模块..."
      ls node_modules/express || echo "警告: express模块未找到"
      echo "构建完成!"
    # 启动命令
    startCommand: cd backend && npm start
    # 环境变量
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    # 健康检查
    healthCheckPath: /api/health
    # 自动部署
    autoDeploy: true
    # 区域选择（可选）
    # region: frankfurt
    # 资源计划（免费计划）
    plan: free
    # 磁盘配置
    disk:
      name: app-data
      mountPath: /data
      sizeGB: 1

# 数据库配置（如果需要可以添加）
# databases:
#   - name: greeting-card-db
#     databaseName: greeting_card
#     user: greeting_card_user
#     plan: free